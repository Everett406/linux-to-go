name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resize icon to 512x512
        run: node scripts/resize-icon.js

      - name: Create ICO file
        run: node scripts/create-icon.js

      - name: Build Windows packages
        run: npm run build:win

      - name: List dist directory
        run: Get-ChildItem -Path dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*Setup.exe
            dist/*Portable.exe
          if-no-files-found: error

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/

      - name: List downloaded files
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Linux To Go ${{ github.ref_name }}
          body: |
            ## Linux To Go ${{ github.ref_name }}

            将 Ubuntu 装入 U 盘/移动硬盘，即插即用！

            ### 下载
            | 类型 | 文件名 | 说明 |
            |------|--------|------|
            | 🚀 安装程序 | `Linux To Go-*-Setup.exe` | 推荐，带安装向导 |
            | 📦 便携版 | `Linux To Go-*-Portable.exe` | 无需安装，直接运行 |

            ### 系统要求
            - Windows 10/11 (64位)
            - 管理员权限（Ventoy 安装需要）
            - 建议 U 盘容量 16GB 以上

            ### 使用说明
            1. 下载安装程序或便携版
            2. 插入 U 盘，打开 Linux To Go
            3. 选择设备 → 选择 Ubuntu 版本 → 开始制作
            4. 制作完成后，在目标电脑 BIOS 中选择 U 盘启动

            ### 注意事项
            - ⚠️ 制作过程中会格式化 U 盘，请提前备份数据
            - 🌐 下载 ISO 需要网络连接（约 5GB）
            - 💾 持久化功能可保留文件和安装的软件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
