name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create icon
        run: node scripts/create-icon.js

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist directory
        run: Get-ChildItem -Path dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.yml
          if-no-files-found: error

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/

      - name: List downloaded files
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Linux To Go ${{ github.ref_name }}
          body: |
            ## Linux To Go ${{ github.ref_name }}

            将 Ubuntu 装入 U 盘/移动硬盘，即插即用！

            ### 下载
            - `Linux To Go-*-Windows-x64.exe` - 安装程序（推荐）
            - `Linux To Go-*-Windows-x64.exe` (portable) - 便携版，无需安装

            ### 系统要求
            - Windows 10/11
            - 管理员权限
            - 建议 U 盘容量 16GB 以上

            ### 使用说明
            1. 下载并运行安装程序
            2. 插入 U 盘，打开 Linux To Go
            3. 按照向导完成制作
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
